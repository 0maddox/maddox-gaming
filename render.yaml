services:
  - type: web
    name: maddox-gaming-api
    env: ruby
    plan: free
    rootDir: backend
    buildCommand: bundle install
    startCommand: bundle exec rails db:prepare && bundle exec puma
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RACK_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: enabled
      - key: RAILS_SERVE_STATIC_FILES
        value: enabled
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: maddox-gaming-db
          property: connectionString
      - key: APP_HOST
        value: api.maddox-gaming.com
      - key: APP_PROTOCOL
        value: https
      - key: BASE_URL
        value: https://maddox-gaming.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://www.maddox-gaming.com
      - key: ACTIVE_STORAGE_SERVICE
        value: cloudflare_r2
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        sync: false
      - key: CLOUDFLARE_R2_REGION
        value: auto
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ENDPOINT
        sync: false
      - key: CLOUDFLARE_R2_FORCE_PATH_STYLE
        value: false
      - key: CLOUDFLARE_R2_PUBLIC
        value: true
      - key: ACTIVE_JOB_QUEUE_ADAPTER
        value: async
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: false
      - key: S3_PUBLIC
        value: true
      - key: PAYMENT_BUSINESS_NAME
        value: Maddox Gaming
      - key: FLUTTERWAVE_SECRET
        sync: false
      - key: FLUTTERWAVE_WEBHOOK_SECRET_HASH
        sync: false
      - key: FLUTTERWAVE_API_URL
        value: https://api.flutterwave.com/v3
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        value: https://api.maddox-gaming.com/api/mpesa/callback
      - key: MPESA_API_BASE_URL
        value: https://api.safaricom.co.ke
      - key: MAILER_FROM_ADDRESS
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_DOMAIN
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTHENTICATION
        value: plain
      - key: SMTP_ENABLE_STARTTLS_AUTO
        value: true
      - key: SMS_API_URL
        sync: false
      - key: SMS_API_KEY
        sync: false
      - key: SMS_SENDER_ID
        sync: false
      - key: SOLID_QUEUE_IN_PUMA
        value: false

databases:
  - name: maddox-gaming-db
    databaseName: maddox_gaming
    user: maddox_gaming_user
    plan: free
